services:
  spark:
    image: apache/spark:3.5.1-python3
    container_name: tlc_spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines

  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: tlc_spark_worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines
    depends_on:
      - spark

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: tlc_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/data
      - ./pipelines:/home/jovyan/pipelines
      - ./notebooks:/home/jovyan/notebooks
      - ./docs:/home/jovyan/docs
      - ./src:/home/jovyan/src
    depends_on:
      - spark

